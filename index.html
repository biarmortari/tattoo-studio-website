<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, minimum-scale=1"
    />
    <title>Roque Ink</title>
    <link rel="stylesheet" href="./pages/index.css" />
    <link rel="stylesheet" href="./vendor/fonts.css" />
    <link rel="shortcut icon" href="./favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <div id="image-modal" class="modal hidden">
      <span class="close-button">&times;</span>
      <img class="modal-content" src="" alt="" />
    </div>
    <div class="page">
      <div class="stars"></div>
      <header class="header">
        <h1 class="header__title">ROQUE INK</h1>
        <nav class="header__nav">
          <a class="header__link" href="#portfolio">PORTFÓLIO</a>
          <a class="header__link" href="#catalog">CATÁLOGO</a>
          <a class="header__link" href="#contacts">CONTATOS</a>
        </nav>
      </header>
      <main class="main">
        <section class="hero">
          <div class="hero__content">
            <h2 class="hero__title">SEJA BEM VINDO AO MEU MUNDO.</h2>
            <h3 class="hero__subtitle">
              Subtítulo do site que fala sobre o estúdio ou visão do artista
              etc.
            </h3>
          </div>
        </section>
        <section class="catalog" id="catalog">
          <div class="filter__buttons">
            <button class="filter__button" data-filter="mini-realismo">
              Mini Realismo
            </button>
            <button class="filter__button" data-filter="neo-tribal">
              Neo Tribal
            </button>
          </div>

          <div class="gallery">
            <div class="gallery__item mini-realismo">
              <img
                class="item__image"
                src="./images/catalog/foto1.avif"
                alt="Mini Realismo 1"
              />
            </div>
            <div class="gallery__item mini-realismo">
              <img
                class="item__image"
                src="./images/catalog/foto4.avif"
                alt="Mini Realismo 2"
              />
            </div>
            <div class="gallery__item mini-realismo">
              <img
                class="item__image"
                src="./images/catalog/foto7.avif"
                alt="Mini Realismo 3"
              />
            </div>
            <div class="gallery__item mini-realismo">
              <img
                class="item__image"
                src="./images/catalog/foto2.avif"
                alt="Mini Realismo 4"
              />
            </div>
            <div class="gallery__item neo-tribal">
              <img
                class="item__image"
                src="./images/catalog/foto5.avif"
                alt="Neo Tribal 1"
              />
            </div>
            <div class="gallery__item neo-tribal">
              <img
                class="item__image"
                src="./images/catalog/foto3.avif"
                alt="Neo Tribal 2"
              />
            </div>
            <div class="gallery__item neo-tribal">
              <img
                class="item__image"
                src="./images/catalog/foto6.avif"
                alt="Neo Tribal 3"
              />
            </div>
          </div>
        </section>
        <section class="catalogo"></section>
        <section class="contacts" id="contacts">
          <div class="contacts__wrapper">
            <div class="contacts__content">
              <div class="contacts__infos">
                <h3 class="contacts__brand">ROQUE INK</h3>
                <p class="contacts__subtitle">
                  Siga no Instagram e entre em contato via WhatsApp
                </p>
                <a
                  class="contacts__address"
                  href="https://maps.app.goo.gl/BB5xXBfHN2H4ZsDq9"
                  target="_blank"
                  >Av. Paulista, 1578 - Bela Vista, São Paulo - SP, 01310-200</a
                >
                <div class="social-buttons">
                  <a
                    href="https://instagram.com/roque.ink"
                    target="_blank"
                    class="social-button instagram"
                  >
                    <i class="fab fa-instagram"></i>
                  </a>
                  <a
                    href="http://www.google.com/url?q=http%3A%2F%2Fwa.me%2F5511971927873&sa=D&sntz=1&usg=AOvVaw0d0AXkpVoAI_wAM7DtIl6T"
                    target="_blank"
                    class="social-button whatsapp"
                  >
                    <i class="fab fa-whatsapp"></i>
                  </a>
                </div>
              </div>
            </div>
            <div class="map">
              <iframe
                class="map__iframe"
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.1958342476273!2d-46.65845682560678!3d-23.561409061592144!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94ce59ceb1eb771f%3A0xe904f6a669744da1!2sMuseu%20de%20Arte%20de%20S%C3%A3o%20Paulo%20Assis%20Chateaubriand!5e0!3m2!1spt-BR!2sbr!4v1758314827290!5m2!1spt-BR!2sbr"
                width="600"
                height="450"
                style="border: 0"
                allowfullscreen=""
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
          </div>
        </section>
      </main>
      <footer class="footer"></footer>
      <script src="./pages/index.js"></script>
    </div>
  </body>
</html>
